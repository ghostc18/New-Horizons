<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | HomeQuest Solutions</title>
        <meta name="description" content="Thank you for contacting HomeQuest Solutions.">
        <link rel="icon" type="image/webp" href="images/homequest-logo-no-tagline.webp">
    <style>
        :root {
            --ink: #17251f;
            --muted: #5f685f;
            --paper: #fffaf3;
            --white: #ffffff;
            --forest: #17634f;
            --forest-dark: #0f4538;
            --orange: #e46f2b;
            --line: #ead8c4;
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
            background: var(--paper);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.55;
        }

        .thank-you {
            width: min(720px, 100%);
            text-align: center;
        }

        .logo {
            width: min(280px, 70vw);
            height: auto;
            margin: 0 auto 28px;
        }

        .panel {
            padding: clamp(28px, 6vw, 56px);
            background: var(--white);
            border: 1px solid rgba(228, 111, 43, 0.18);
            border-radius: var(--radius);
            box-shadow: 0 22px 60px rgba(23, 99, 79, 0.13);
        }

        h1 {
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(2.3rem, 8vw, 4.5rem);
            font-weight: 500;
            line-height: 1;
            margin-bottom: 18px;
        }

        p {
            color: var(--muted);
            font-size: 1.06rem;
            margin-bottom: 24px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            border-radius: 999px;
            padding: 11px 18px;
            color: var(--white);
            background: var(--forest);
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 10px 24px rgba(23, 99, 79, 0.18);
        }

        .button:hover {
            background: var(--forest-dark);
        }
    </style>
</head>
<body>
    <main class="thank-you">
            <img class="logo" src="images/homequest-logo-no-tagline.png" alt="HomeQuest Solutions">
            <section class="panel">
                <h1>Thank you.</h1>
                <p>Your request was received. Someone from HomeQuest Solutions will reach out soon to talk through your property and next steps.</p>
                <a class="button" href="index.html">Back to homepage</a>
            </section>
        </main>
</body>
</html>
